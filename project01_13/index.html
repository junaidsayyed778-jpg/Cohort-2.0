<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">
        <nav></nav>
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://images.pexels.com/photos/6962089/pexels-photo-6962089.jpeg
                " alt="">
                <h2>Todo List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://images.pexels.com/photos/12815224/pexels-photo-12815224.jpeg
                " alt="">
                <h2>Daily Planner</h2>
            </div>
            <div class="moti elem" id="2">
                <img src="https://images.pexels.com/photos/2681319/pexels-photo-2681319.jpeg
                " alt="">
                <h2>Motivation</h2>
            </div>
            <div class="pomo elem" id="3">
                <img src="https://images.pexels.com/photos/3463090/pexels-photo-3463090.jpeg
                " alt="">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="goal elem" id="4">
                <img src="https://images.pexels.com/photos/4018810/pexels-photo-4018810.jpeg
             " alt="">
                <h2>Daily Goals</h2>
            </div>
        </section>

        <section class="fullElem todo-fullpage">
            <button class="back" id="0">back</button>
            <h2>Personalize Your Todo</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form action="">
                        <h3>Add Task</h3>
                        <input type="text" placeholder="Enter Task">
                        <textarea placeholder="Enter details"></textarea>
                        <button>Add Task</button>
                    </form>

                </div>
                <div class="allTask">
                    <div class="task">
                        <h5>today's goal</h5>
                        <button>Delete</button>
                    </div>

                    
                </div>
            </div>
        </section>
        <section class="fullElem daily-planner-fullpage">Daily Plans
            <button class="back" id="1">back</button>
        </section>
        <section class="fullElem motivation-fullpage">Motivation Quotes
            <button class="back" id="2">back</button>
        </section>
        <section class="fullElem timer-fullpage">Timer
            <button class="back" id="3">back</button>
        </section>
        <section class="fullElem daily-goals-fullpage">Daily Goals
            <button class="back" id="4">back</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
